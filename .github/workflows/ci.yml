name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        env:
          VITE_FAVCRM_API_URL: https://api.example.com
          VITE_FAVCRM_COMPANY_ID: 00000000-0000-0000-0000-000000000000
          VITE_SITE_URL: https://storefront.example.com
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        env:
          VITE_FAVCRM_API_URL: https://api.example.com
          VITE_FAVCRM_COMPANY_ID: 00000000-0000-0000-0000-000000000000
          VITE_SITE_URL: https://storefront.example.com
        run: pnpm build
